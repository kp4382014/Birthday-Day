<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Happy Birthday Hannie ✨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none}
#c{position:fixed;inset:0;display:block;width:100%!important;height:100%!important}

/* Cinematic letter-box bars */
#bars-top,#bars-bot{position:fixed;left:0;right:0;z-index:20;pointer-events:none;
  background:#000;transition:height 1.8s cubic-bezier(.7,0,.3,1)}
#bars-top{top:0;height:14vh}
#bars-bot{bottom:0;height:14vh}
#bars-top.open,#bars-bot.open{height:0}

/* Caption — BOTTOM of screen, below cake */
#caption{position:fixed;bottom:18vmin;left:50%;transform:translateX(-50%);z-index:15;
  pointer-events:none;text-align:center;width:min(520px,90vw);
  opacity:0;transition:opacity .9s ease;
  background:rgba(0,0,0,.6);border-radius:16px;
  padding:clamp(10px,3vmin,20px) clamp(14px,5vmin,32px);backdrop-filter:blur(6px)}
#caption.show{opacity:1}
#caption.hide{opacity:0}
.cap-line{font-family:Georgia,serif;font-style:italic;
  font-size:clamp(0.9rem,4vmin,1.25rem);
  color:rgba(255,230,248,.92);
  text-shadow:0 0 18px rgba(200,100,255,.7),0 2px 8px rgba(0,0,0,.9);
  line-height:1.8;letter-spacing:.03em}

/* BIG title reveal */
#big-title{position:fixed;inset:0;z-index:14;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  opacity:0;transition:opacity 1.2s ease}
#big-title.show{opacity:1}
#bt-sub{font-family:Georgia,serif;font-style:italic;
  font-size:clamp(.6rem,3vmin,.85rem);letter-spacing:.38em;text-transform:uppercase;
  color:rgba(200,160,255,.55);margin-bottom:6px}
#bt-name{font-family:Georgia,serif;font-style:italic;font-weight:bold;
  font-size:clamp(3.2rem,20vmin,9rem);line-height:1;
  color:transparent;
  background:linear-gradient(135deg,#fff5fb,#ffd4ec,#ff4fa8,#ffb3d9,#fff5fb);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:sh 3s linear infinite;
  filter:drop-shadow(0 0 28px rgba(255,60,160,.75)) drop-shadow(0 0 65px rgba(200,50,255,.4))}
#bt-tagline{font-family:Georgia,serif;font-style:italic;
  font-size:clamp(.7rem,4.2vmin,1.1rem);color:rgba(255,200,240,.65);
  letter-spacing:.1em;margin-top:2px}
@keyframes sh{to{background-position:300% 0}}

/* Final wish card */
#wish-card{position:fixed;inset:0;z-index:14;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(8px,3.5vmin,18px);padding:clamp(20px,8.4vmin,50px);text-align:center;
  opacity:0;transition:opacity 1.4s ease;
  background:rgba(0,0,0,0);}
#wish-card.show{opacity:1}
.wc-emoji{font-size:clamp(1.6rem,9.8vmin,2.8rem);letter-spacing:.18em;
  filter:drop-shadow(0 0 12px rgba(255,80,160,.6))}
.wc-text{font-family:Georgia,serif;font-style:italic;font-weight:bold;
  font-size:clamp(1.1rem,5.5vmin,1.65rem);
  color:transparent;
  background:linear-gradient(135deg,#ffe8f5,#ff80c8,#ff40a0,#ffb3d9,#ffe8f5);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:sh 2.8s linear infinite;
  filter:drop-shadow(0 0 18px rgba(255,80,160,.6));line-height:1.4}
.wc-sub{font-family:Georgia,serif;font-style:italic;
  font-size:clamp(0.88rem,4vmin,1.2rem);color:rgba(255,210,235,.88);line-height:1.85;
  text-shadow:0 2px 12px rgba(0,0,0,.95),0 0 25px rgba(0,0,0,.8)}

/* Tap to start */
#starter{
  position:fixed;inset:0;z-index:99;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;cursor:pointer;transition:opacity 1s ease;
}
#starter.gone{opacity:0;pointer-events:none;}
#starter-icon{font-size:clamp(2.5rem,10vw,5rem);margin-bottom:16px;animation:stpulse 2s ease-in-out infinite;}
#starter-txt{font-family:Georgia,serif;font-style:italic;font-size:clamp(1.4rem,6vw,2.8rem);color:rgba(255,200,235,.85);}
#starter-sub{font-family:Georgia,serif;font-style:italic;font-size:clamp(.6rem,2.5vw,.85rem);letter-spacing:.3em;text-transform:uppercase;color:rgba(255,160,200,.35);margin-top:12px;}
@keyframes stpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}

/* Progress dots */
#dots{position:fixed;bottom:3vh;left:50%;transform:translateX(-50%);z-index:16;
  display:flex;gap:7px;pointer-events:none}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);
  transition:all .5s ease}
.dot.active{background:rgba(255,150,220,.85);transform:scale(1.4);
  box-shadow:0 0 8px rgba(255,100,200,.7)}
</style>
</head>

<div id="starter">

<div id="wish-card">

<script>
'use strict';
const C=document.getElementById('c');
const X=C.getContext('2d');
let W=0,H=0,F=0;
function rsz(){W=C.width=innerWidth;H=C.height=innerHeight;}
rsz();
window.addEventListener('resize',rsz);
window.addEventListener('orientationchange',()=>setTimeout(rsz,220));
const rn=(a,b)=>Math.random()*(b-a)+a;
const PI2=Math.PI*2;

// ── SOUND ─────────────────────────────────────────
let AC=null;
function getAC(){
  if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();}catch(e){}
  return AC;
}
function snd(f,d,v){
  try{const ac=getAC();if(!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);o.type='sine';
    o.frequency.setValueAtTime(f,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*.45,ac.currentTime+d);
    g.gain.setValueAtTime(0,ac.currentTime);
    g.gain.linearRampToValueAtTime(v,ac.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
    o.start();o.stop(ac.currentTime+d);}catch(e){}
}
function sparkle(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>snd(f,.32,.1),i*68));}
function harp(){[392,494,587,698,784,988,1175].forEach((f,i)=>setTimeout(()=>snd(f,.5,.08),i*55));}
function boom(){
  try{const ac=getAC();if(!ac)return;
    const b=ac.createBuffer(1,ac.sampleRate*.22,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.5);
    const s=ac.createBufferSource();s.buffer=b;
    const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=160;
    const g=ac.createGain();g.gain.setValueAtTime(.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.22);
    s.connect(flt);flt.connect(g);g.connect(ac.destination);
    s.start();s.stop(ac.currentTime+.24);}catch(e){}
}
document.addEventListener('touchstart',()=>getAC(),{once:true,passive:true});
document.addEventListener('mousedown',()=>getAC(),{once:true});
document.addEventListener('click',()=>getAC(),{once:true});

// ── STARS ─────────────────────────────────────────
const STARS=[];
for(let i=0;i<280;i++){
  STARS.push({
    x:rn(0,1),y:rn(0,1),
    r:rn(.25,2.4),
    hue:rn(200,360),
    tw:rn(0,PI2),twS:rn(.01,.055),
    a:rn(.18,.95),
    drift:rn(-.0002,.0002)
  });
}

// Parallax star layers
const DEEP_STARS=[];
for(let i=0;i<120;i++){
  DEEP_STARS.push({x:rn(0,1),y:rn(0,1),r:rn(.15,.8),a:rn(.1,.4),hue:rn(220,300)});
}

// ── NEBULA ────────────────────────────────────────
const NEBS=[
  {x:.12,y:.22,r:.45,h:270,s:.65,speed:.0003},
  {x:.88,y:.15,r:.38,h:320,s:.55,speed:.0004},
  {x:.5, y:.75,r:.5, h:220,s:.6, speed:.0002},
  {x:.05,y:.7, r:.32,h:300,s:.48,speed:.0005},
  {x:.95,y:.6, r:.36,h:190,s:.45,speed:.0003},
  {x:.5, y:.35,r:.28,h:340,s:.4, speed:.0006},
];

// ── SHOOTING STARS ────────────────────────────────
const SHOOTS=[];
class Shoot{
  constructor(){
    this.x=rn(W*.1,W);this.y=rn(0,H*.5);
    const a=rn(.12,.38)*Math.PI,sp=rn(8,22);
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.len=rn(60,220);
    this.life=1;this.decay=rn(.018,.045);
    this.hue=rn(200,340);this.width=rn(1.2,2.8);
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;}
  draw(){
    if(this.life<=0)return;
    const m=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    const tx=this.x-this.vx/m*this.len,ty=this.y-this.vy/m*this.len;
    const g=X.createLinearGradient(tx,ty,this.x,this.y);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(.5,`hsla(${this.hue},100%,88%,${this.life*.45})`);
    g.addColorStop(1,`hsla(${this.hue},100%,96%,${this.life*.88})`);
    X.strokeStyle=g;X.lineWidth=this.width;X.lineCap='round';
    X.beginPath();X.moveTo(tx,ty);X.lineTo(this.x,this.y);X.stroke();
    // head glow
    const fg=X.createRadialGradient(this.x,this.y,0,this.x,this.y,10);
    fg.addColorStop(0,`hsla(${this.hue},100%,95%,${this.life*.8})`);
    fg.addColorStop(1,'rgba(0,0,0,0)');
    X.beginPath();X.arc(this.x,this.y,10,0,PI2);X.fillStyle=fg;X.fill();
  }
  dead(){return this.life<=0||this.x>W+120||this.y>H+60;}
}

// ── SPACE DUST / FLOATING PARTICLES ───────────────
const DUST=[];
class Dust{
  constructor(forced){
    this.x=forced?forced.x:rn(0,W);
    this.y=forced?forced.y:rn(0,H);
    this.vx=rn(-.3,.3)+(forced?.vx||0);
    this.vy=rn(-.8,-.1)+(forced?.vy||0);
    this.r=forced?rn(1.5,4):rn(.5,2.5);
    this.hue=forced?forced.hue:rn(260,360);
    this.life=1;this.decay=rn(.002,.008)*(forced?1.5:1);
    this.glow=!!forced;
    this.tw=rn(0,PI2);this.twS=rn(.02,.06);
  }
  update(){
    this.tw+=this.twS;
    this.vx+=Math.sin(this.tw)*.012;
    this.vx*=.995;this.x+=this.vx;this.y+=this.vy;
    this.life-=this.decay;
  }
  draw(){
    const alpha=this.life*(this.glow?.88:.6);
    if(this.glow){
      const g=X.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*4);
      g.addColorStop(0,`hsla(${this.hue},100%,88%,${alpha})`);
      g.addColorStop(.4,`hsla(${this.hue},100%,65%,${alpha*.5})`);
      g.addColorStop(1,`hsla(${this.hue},100%,55%,0)`);
      X.beginPath();X.arc(this.x,this.y,this.r*4,0,PI2);X.fillStyle=g;X.fill();
    }
    X.beginPath();X.arc(this.x,this.y,this.r,0,PI2);
    X.fillStyle=`hsla(${this.hue},100%,88%,${alpha})`;X.fill();
  }
  dead(){return this.life<=0||this.y<-30;}
}

// ── FIREWORK SPARKS ───────────────────────────────
const SPARKS=[];
class Spark{
  constructor(x,y,a,sp,h,type){
    this.x=x;this.y=y;
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.h=h;this.life=1;this.type=type||'peony';
    this.decay=.009+rn(0,.015);
    this.grav=type==='willow'?.055:.042;
    this.drag=type==='willow'?.988:.982;
    this.tr=[];this.tLen=type==='willow'?22:14;
    this.blink=Math.random()>.5;
    this.bp=rn(0,PI2);this.bs=rn(.1,.2);
  }
  update(){
    this.tr.unshift({x:this.x,y:this.y});
    if(this.tr.length>this.tLen)this.tr.pop();
    this.bp+=this.bs;
    this.vy+=this.grav;this.vx*=this.drag;this.vy*=this.drag;
    this.x+=this.vx;this.y+=this.vy;this.life-=this.decay;
  }
  draw(){
    for(let i=1;i<this.tr.length;i++){
      const p=1-i/this.tr.length;
      X.beginPath();
      X.strokeStyle=`hsla(${this.h},100%,${55+p*32}%,${this.life*p*.62})`;
      X.lineWidth=Math.max(.15,p*2.2);X.lineCap='round';
      X.moveTo(this.tr[i-1].x,this.tr[i-1].y);
      X.lineTo(this.tr[i].x,this.tr[i].y);X.stroke();
    }
    const bv=this.blink?(.5+Math.sin(this.bp)*.5):1;
    X.beginPath();X.arc(this.x,this.y,1.6,0,PI2);
    X.fillStyle=`hsla(${this.h},100%,82%,${this.life*bv})`;X.fill();
  }
  dead(){return this.life<=0||this.y>H+40;}
}

// Rocket
const ROCKETS=[];
class Rocket{
  constructor(sx,tx,ty,h,special){
    this.x=sx;this.y=H+5;this.tx=tx;this.ty=ty;
    const f=rn(40,56);
    this.vx=(tx-sx)/f;this.vy=(ty-H)/f;
    this.h=h;this.special=special||null;
    this.trail=[];this.done=false;
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14)this.trail.shift();
    this.vy+=.09;this.x+=this.vx;this.y+=this.vy;
    return this.y<=this.ty&&!this.done;
  }
  draw(){
    for(let i=1;i<this.trail.length;i++){
      const p=i/this.trail.length;
      X.beginPath();
      X.strokeStyle=`hsla(${this.h},100%,${45+p*40}%,${p*.85})`;
      X.lineWidth=p*2.5;X.lineCap='round';
      X.moveTo(this.trail[i-1].x,this.trail[i-1].y);
      X.lineTo(this.trail[i].x,this.trail[i].y);X.stroke();
    }
    X.beginPath();X.arc(this.x,this.y,3,0,PI2);
    X.fillStyle=`hsl(${this.h},100%,90%)`;
    X.shadowColor='white';X.shadowBlur=8;X.fill();X.shadowBlur=0;
  }
}

function burstFlash(x,y,h){
  const g=X.createRadialGradient(x,y,0,x,y,90);
  g.addColorStop(0,`hsla(${h},100%,96%,.9)`);
  g.addColorStop(.3,`hsla(${h},100%,78%,.5)`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  X.save();X.globalCompositeOperation='lighter';
  X.beginPath();X.arc(x,y,90,0,PI2);X.fillStyle=g;X.fill();
  X.restore();
}

function fireBurst(x,y,h,n,pw,type){
  const cnt=Math.floor(n*.65);
  for(let i=0;i<cnt;i++)
    SPARKS.push(new Spark(x,y,(i/cnt)*PI2+rn(-.05,.05),pw*rn(.82,1.18),h,type||'peony'));
  // gold inner
  for(let i=0;i<Math.floor(cnt*.3);i++)
    SPARKS.push(new Spark(x,y,rn(0,PI2),pw*rn(.18,.42),46,'glitter'));
  burstFlash(x,y,h);boom();
}

function launchRocket(sx,tx,ty,h,type){
  ROCKETS.push(new Rocket(sx,tx,ty,h,type));
  // whistle
  try{const ac=getAC();if(!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(280,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100,ac.currentTime+.45);
    g.gain.setValueAtTime(.055,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.5);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.5);}catch(e){}
}

// ── CAKE — REAL PHOTO ─────────────────────────────
let cakeFloat=0;
let cakeScale=0;
let cakeOffsetY=0;
let cakeY=()=>H*.5+cakeFloat;

// Load the real cake image

  const alpha=Math.min(1,scale<.18?scale/.18:1);
  // fit cake to screen — max 88% of width or 52% of height
  const maxW=W, maxH=H*.62;
  const imgAR=_cakeImg.width/_cakeImg.height;
  let dw=maxW, dh=dw/imgAR;
  if(dh>maxH){dh=maxH;dw=dh*imgAR;}
  dw*=scale; dh*=scale;
  const dx=cx-dw/2, dy=cy+cakeOffsetY-dh*.5;
  X.save();
  X.globalAlpha=alpha;
  X.drawImage(_cakeImg,dx,dy,dw,dh);
  X.restore();
}

// ── CINEMATIC TIMELINE ────────────────────────────
// Each scene: {t, fn}  — t in ms from start
let sceneTimer=null;
let currentDot=-1;
const DOT_COUNT=8;

// Build dots
const dotsEl=document.getElementById('dots');
for(let i=0;i<DOT_COUNT;i++){
  const d=document.createElement('div');d.className='dot';dotsEl.appendChild(d);
}
function setDot(i){
  document.querySelectorAll('.dot').forEach((d,j)=>d.className='dot'+(j===i?' active':''));
  currentDot=i;
}

const captions=[
  '',
  'hey Hannie 👋',
  'just wanted to say something real quick 🎂',
  'no big deal or anything…',
  'happy birthday 🙂\nyou deserve good things today',
  'you might not say much\nbut honestly that\'s kind of your thing 😄\nand it works',
  '✦ glad you exist ✦',
  '',
];

function showCaption(text,duration){
  const el=document.getElementById('caption');
  const cap=document.getElementById('cap-text');
  cap.innerHTML=text.replace(/\n/g,'<br>');
  el.className='show';
  if(duration){
    setTimeout(()=>el.className='hide',duration-600);
  }
}
function hideCaption(){document.getElementById('caption').className='hide';}

function showBigTitle(dur){
  document.getElementById('big-title').className='show';
  if(dur) setTimeout(()=>document.getElementById('big-title').className='',dur-800);
}

function showWishCard(dur){
  document.getElementById('wish-card').className='show';
  sparkle();setTimeout(sparkle,400);
}

// Scene timeline
const SCENES=[
  // 0: Letterbox opens, stars appear
  {t:0, fn:()=>{
    setDot(0);
    document.getElementById('bars-top').classList.add('open');
    document.getElementById('bars-bot').classList.add('open');
    getAC();
  }},
  // 1: hey Hannie caption — no cake yet
  {t:2000, fn:()=>{
    setDot(1);
    showCaption(captions[1],3000);
    SHOOTS.push(new Shoot());SHOOTS.push(new Shoot());
  }},
  // 2: Cake fades in with caption above it
  {t:5500, fn:()=>{
    setDot(2);
    showCaption(captions[2],3500);
    harp();
    let sc=0;
    const anim=setInterval(()=>{
      sc=Math.min(1,sc+.022);
      cakeScale=sc;
      if(sc>=1)clearInterval(anim);
    },16);
    for(let i=0;i<20;i++) setTimeout(()=>{
      DUST.push(new Dust({x:W*.5+rn(-80,80),y:H*.5+rn(-80,80),vx:rn(-1,1),vy:rn(-2,0),hue:rn(300,360)}));
    },i*80);
  }},
  // 3: "no big deal" — above cake
  {t:9500, fn:()=>{
    setDot(3);
    showCaption(captions[3],3200);
    sparkle();
  }},
  // 4: birthday message — above cake
  {t:13500, fn:()=>{
    setDot(4);
    showCaption(captions[4],5500);
    SHOOTS.push(new Shoot());
  }},
  // 5: "you might not say much" — above cake
  {t:20000, fn:()=>{
    setDot(5);
    showCaption(captions[5],6000);
    SHOOTS.push(new Shoot());SHOOTS.push(new Shoot());
    launchRocket(W*.5,W*.4,H*.28,rn(0,360));
    setTimeout(()=>launchRocket(W*.3,W*.28,H*.32,rn(0,360)),800);
  }},
  // 6: "glad you exist" — cake floats away FIRST, then big Hannie title
  {t:27000, fn:()=>{
    setDot(6);
    hideCaption();
    // Float cake off screen first
    let flyOut=0;
    const flyInterval=setInterval(()=>{
      flyOut+=10;
      cakeOffsetY=-flyOut;
      if(flyOut>=H+100){
        clearInterval(flyInterval);
        cakeScale=0;cakeOffsetY=0;
        // Now show big title on clean sky
        showCaption(captions[6],4000);
        sparkle();setTimeout(sparkle,350);
        showBigTitle(4000);
        // Fireworks
        const fw=[
          [200, W*.5,  H*.3,  330],
          [600, W*.25, H*.35, 280],
          [900, W*.75, H*.28, 50],
          [1300,W*.5,  H*.22, 120],
          [1800,W*.2,  H*.4,  200],
          [2000,W*.8,  H*.38, 350],
          [2500,W*.5,  H*.25, 45],
        ];
        fw.forEach(([delay,x,y,h])=>setTimeout(()=>launchRocket(x,x,y,h,'willow'),delay));
      }
    },16);
  }},
  // 7: Final wish card
  {t:33000, fn:()=>{
    setDot(7);
    document.getElementById('big-title').className='';
    // Short pause then wish card
    setTimeout(()=>{
      showWishCard();
      sparkle();setTimeout(sparkle,400);
    },600);
    // Gentle fireworks in background
    let fw2Count=0;
    const fwInterval=setInterval(()=>{
      if(fw2Count++>12){clearInterval(fwInterval);return;}
      launchRocket(rn(W*.05,W*.95),rn(W*.05,W*.95),rn(H*.08,H*.4),rn(0,360));
    },1100);
  }},
];

// Run timeline
function startCinematic(){
  SCENES.forEach(s=>setTimeout(s.fn, s.t));
}
// ── TAP TO START ──────────────────────────────────
function handleStart(){
  getAC();
  const st=document.getElementById('starter');
  st.classList.add('gone');
  setTimeout(()=>st.remove(),1100);
  setTimeout(startCinematic,600);
}
document.getElementById('starter').addEventListener('click',handleStart);
document.getElementById('starter').addEventListener('touchend',e=>{e.preventDefault();handleStart();},{passive:false});

// ── MAIN LOOP ─────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  F++;

  // Background fade
  X.fillStyle=`rgba(2,0,8,${cakeScale>.0?.14:.22})`;
  X.fillRect(0,0,W,H);

  // Deep stars (static, tiny)
  X.save();X.globalAlpha=.5;
  for(const s of DEEP_STARS){
    X.beginPath();X.arc(s.x*W,s.y*H,s.r,0,PI2);
    X.fillStyle=`hsla(${s.hue},60%,85%,${s.a})`;X.fill();
  }
  X.restore();

  // Nebulae
  X.save();X.globalCompositeOperation='screen';
  for(const n of NEBS){
    const pulse=Math.sin(F*.006+n.h*.02)*.05;
    const g=X.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r*Math.min(W,H));
    g.addColorStop(0,`hsla(${n.h},80%,${32+pulse*100}%,${n.s*.13})`);
    g.addColorStop(.5,`hsla(${n.h+18},70%,22%,${n.s*.06})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    X.beginPath();X.arc(n.x*W,n.y*H,n.r*Math.min(W,H),0,PI2);
    X.fillStyle=g;X.fill();
  }
  X.restore();

  // Stars
  for(const s of STARS){
    s.tw+=s.twS;s.x=(s.x+s.drift+1)%1;
    const alpha=s.a*(.45+Math.sin(s.tw)*.55);
    X.beginPath();X.arc(s.x*W,s.y*H,s.r,0,PI2);
    X.fillStyle=`hsla(${s.hue},85%,90%,${alpha})`;X.fill();
    if(s.r>1.6){
      const sx=s.x*W,sy=s.y*H;
      X.strokeStyle=`hsla(${s.hue},80%,92%,${alpha*.28})`;X.lineWidth=.5;
      X.beginPath();X.moveTo(sx-s.r*2.8,sy);X.lineTo(sx+s.r*2.8,sy);X.stroke();
      X.beginPath();X.moveTo(sx,sy-s.r*2.8);X.lineTo(sx,sy+s.r*2.8);X.stroke();
    }
  }

  // Shooting stars
  if(F%110===0&&cakeScale<.5) SHOOTS.push(new Shoot());
  for(let i=SHOOTS.length-1;i>=0;i--){
    SHOOTS[i].update();SHOOTS[i].draw();
    if(SHOOTS[i].dead())SHOOTS.splice(i,1);
  }

  // Ambient dust
  if(F%4===0&&DUST.length<150) DUST.push(new Dust());
  for(let i=DUST.length-1;i>=0;i--){
    DUST[i].update();DUST[i].draw();
    if(DUST[i].dead())DUST.splice(i,1);
  }

  // Cake floating
  if(cakeScale>0){
    cakeFloat=Math.sin(F*.018)*10;
    drawCake(W*.5, cakeY(), cakeScale);
  }

  // Rockets
  for(let i=ROCKETS.length-1;i>=0;i--){
    const r=ROCKETS[i];
    r.draw();
    if(r.update()){
      r.done=true;
      fireBurst(r.x,r.y,r.h,r.type==='willow'?70:55,r.type==='willow'?7.5:8.5,r.type);
      ROCKETS.splice(i,1);
    }
  }

  // Sparks
  for(let i=SPARKS.length-1;i>=0;i--){
    SPARKS[i].update();SPARKS[i].draw();
    if(SPARKS[i].dead())SPARKS.splice(i,1);
  }
  if(SPARKS.length>1800) SPARKS.splice(0,SPARKS.length-1800);
}

loop();
</script>
