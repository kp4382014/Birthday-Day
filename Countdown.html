<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Almost Time 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#03000d;font-family:'Quicksand',system-ui,sans-serif;user-select:none;touch-action:none;}

canvas{position:fixed;inset:0;display:block;width:100%!important;height:100%!important;}
#bg{z-index:0}
#pc{z-index:5;pointer-events:none}

/* ── tap-to-start overlay ── */
#starter{
  position:fixed;inset:0;z-index:80;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(3,0,13,.96);
  transition:opacity .9s ease;
  cursor:pointer;
}
#starter.gone{opacity:0;pointer-events:none}
#starter-icon{font-size:clamp(2.5rem,10vw,5rem);margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
#starter-txt{font-family:'Great Vibes',Georgia,cursive;font-size:clamp(1.8rem,7vw,3.5rem);color:rgba(255,200,235,.85);line-height:1.3}
#starter-sub{font-size:clamp(.6rem,2.5vw,.8rem);letter-spacing:.3em;text-transform:uppercase;color:rgba(255,160,200,.38);margin-top:14px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* ── main wrapper ── */
#wrap{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(8px,2.5vh,20px);padding:20px;text-align:center;
}

#top-label{
  font-weight:700;font-size:clamp(.52rem,2.5vw,.78rem);
  letter-spacing:.44em;text-transform:uppercase;
  color:rgba(255,170,210,.42);animation:fadeUp 1.2s both .2s;
}

#name-line{
  font-family:'Great Vibes',Georgia,cursive;
  font-size:clamp(2.8rem,13vw,6.8rem);line-height:1;
  color:transparent;
  background:linear-gradient(135deg,#fff8fc,#ffd4ec,#ff4fa8,#ffb3d9,#fff8fc);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite,fadeUp 1.4s cubic-bezier(.22,1,.36,1) both .3s;
  filter:drop-shadow(0 0 20px rgba(255,80,160,.5)) drop-shadow(0 0 44px rgba(200,40,120,.28));
}
@keyframes shimmer{to{background-position:300% 0}}

.div-line{
  width:clamp(55px,22vw,100px);height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,140,195,.45),transparent);
  animation:fadeUp 1.2s both .5s;
}

#sub-msg{
  font-size:clamp(.75rem,3vw,.95rem);
  color:rgba(255,200,235,.48);letter-spacing:.06em;line-height:1.7;
  animation:fadeUp 1.2s both .6s;
}

/* ── clock ── */
#clock{
  display:flex;align-items:flex-start;
  gap:clamp(6px,2.5vw,18px);
  animation:fadeUp 1.4s both .7s;
  margin:clamp(2px,1vh,10px) 0;
}
.unit{display:flex;flex-direction:column;align-items:center;gap:clamp(3px,.8vh,7px);}

.digit{
  position:relative;
  min-width:clamp(55px,17vw,108px);
  padding:clamp(9px,2.3vw,17px) clamp(5px,1.8vw,13px);
  border-radius:13px;
  background:rgba(255,255,255,.028);
  border:1px solid rgba(255,140,195,.15);
  box-shadow:0 0 24px rgba(255,80,160,.07),0 0 55px rgba(180,30,100,.05),inset 0 1px 0 rgba(255,255,255,.055);
  backdrop-filter:blur(10px);overflow:hidden;
}
.digit::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,180,210,.04) 0%,transparent 52%);pointer-events:none;}

.digit-num{
  font-weight:700;font-size:clamp(1.9rem,9.5vw,4.6rem);line-height:1;
  color:transparent;
  background:linear-gradient(180deg,#ffffff 0%,#ffcce8 48%,#ff80bc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(255,100,170,.55));
  display:block;text-align:center;will-change:transform,opacity;
}
.digit-num.flip{animation:flipNum .28s cubic-bezier(.4,0,.2,1);}
@keyframes flipNum{
  0%{transform:translateY(0) scaleY(1);opacity:1}
  40%{transform:translateY(-16%) scaleY(.45);opacity:.25}
  60%{transform:translateY(16%) scaleY(.45);opacity:.25}
  100%{transform:translateY(0) scaleY(1);opacity:1}
}

.unit-label{font-size:clamp(.4rem,1.8vw,.58rem);letter-spacing:.34em;text-transform:uppercase;color:rgba(255,160,200,.3);font-weight:600;}

.colon{
  font-size:clamp(1.6rem,7.5vw,3.8rem);color:rgba(255,140,190,.35);
  line-height:1;padding-top:clamp(9px,2.3vw,17px);font-weight:700;
  animation:blinkColon 1s step-end infinite;
}
@keyframes blinkColon{0%,100%{opacity:.38}50%{opacity:.1}}

#bottom-msg{
  font-size:clamp(.78rem,3.2vw,1rem);color:rgba(255,210,235,.44);
  letter-spacing:.05em;line-height:1.8;
  animation:fadeUp 1.2s both .9s;font-style:italic;font-family:Georgia,serif;
}

/* ── mute button ── */
#mute-btn{
  position:fixed;bottom:clamp(14px,4vw,28px);right:clamp(14px,4vw,28px);
  z-index:20;background:rgba(255,255,255,.055);
  border:1px solid rgba(255,140,195,.2);border-radius:50px;
  padding:8px 16px;font-size:clamp(.5rem,2.2vw,.68rem);
  letter-spacing:.18em;text-transform:uppercase;color:rgba(255,180,215,.5);
  cursor:pointer;transition:all .25s;font-family:'Quicksand',system-ui,sans-serif;
  font-weight:600;backdrop-filter:blur(8px);
}
#mute-btn:hover{background:rgba(255,100,160,.1);color:rgba(255,210,235,.8);}
#mute-btn.muted{color:rgba(255,160,200,.28);border-color:rgba(255,140,195,.1);}

/* ── midnight overlay ── */
#midnight{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:30px;
  background:rgba(3,0,13,.91);
  opacity:0;pointer-events:none;transition:opacity 1s ease;
}
#midnight.on{opacity:1;pointer-events:all}
#midnight-txt{
  font-family:'Great Vibes',Georgia,cursive;
  font-size:clamp(2.6rem,13vw,6.8rem);
  color:transparent;
  background:linear-gradient(135deg,#ffe8f5,#ffd4ec,#ff4fa8,#ffb830,#ff4fa8,#ffb3d9,#ffe8f5);
  background-size:400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 1.8s linear infinite;
  filter:drop-shadow(0 0 26px rgba(255,100,200,.75)) drop-shadow(0 0 50px rgba(255,180,0,.38));
  line-height:1.2;
}
#midnight-sub{
  font-weight:700;font-size:clamp(.65rem,3.2vw,.95rem);
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,210,235,.65);
  margin-top:clamp(10px,3vw,20px);
  text-shadow:0 0 16px rgba(255,100,160,.45);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="pc"></canvas>

<!-- tap to start -->
<div id="starter">
  <div id="starter-icon">🎂</div>
  <div id="starter-txt">Tap to Begin</div>
  <div id="starter-sub">touch anywhere</div>
</div>

<div id="wrap">
  <div id="top-label">countdown to</div>
  <div id="name-line">Hannie's Birthday</div>
  <div class="div-line"></div>
  <div id="sub-msg">the clock is ticking ✨</div>
  <div id="clock">
    <div class="unit">
      <div class="digit"><span class="digit-num" id="dh">00</span></div>
      <div class="unit-label">hours</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digit"><span class="digit-num" id="dm">00</span></div>
      <div class="unit-label">minutes</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digit"><span class="digit-num" id="ds">00</span></div>
      <div class="unit-label">seconds</div>
    </div>
  </div>
  <div id="bottom-msg">until midnight 🎂<br>get ready, it's almost time</div>
</div>

<button id="mute-btn">♪ music on</button>

<div id="midnight">
  <div id="midnight-txt">Happy Birthday<br>Hannie! 🎂</div>
  <div id="midnight-sub">🎉 &nbsp; it's finally your day &nbsp; 🎉</div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════════════
const BG=document.getElementById('bg');
const PC=document.getElementById('pc');
const XB=BG.getContext('2d');
const XP=PC.getContext('2d');
let W=0,H=0,T=0; // T = frame time in seconds
let lastTime=0;

function rsz(){
  W=BG.width=PC.width=innerWidth;
  H=BG.height=PC.height=innerHeight;
}
rsz();
window.addEventListener('resize',rsz);
window.addEventListener('orientationchange',()=>setTimeout(rsz,200));

const rn=(a,b)=>Math.random()*(b-a)+a;
const PI2=Math.PI*2;

// ══════════════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════════════
let AC=null;
let masterGain=null;
let reverbNode=null;
let musicNode=null;
let musicMuted=false;
let musicStarted=false;
let arpeggioTimer=null;
let chordTimer=null;

function buildReverb(ac){
  const len=ac.sampleRate*2.8;
  const buf=ac.createBuffer(2,len,ac.sampleRate);
  for(let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.8);
  }
  const conv=ac.createConvolver();conv.buffer=buf;return conv;
}

function initAudio(){
  if(AC)return;
  try{
    AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    masterGain=AC.createGain();masterGain.gain.value=.0;
    masterGain.connect(AC.destination);
    reverbNode=buildReverb(AC);
    reverbNode.connect(masterGain);
    // fade in master
    masterGain.gain.setValueAtTime(0,AC.currentTime);
    masterGain.gain.linearRampToValueAtTime(.9,AC.currentTime+2.5);
  }catch(e){console.warn('Audio init failed',e);}
}

// ── Reverb send helper ─────────────────────────────
function makeOsc(freq,type,vol,atk,rel,target){
  if(!AC)return;
  const o=AC.createOscillator();
  const g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,AC.currentTime);
  g.gain.linearRampToValueAtTime(vol,AC.currentTime+atk);
  g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+atk+rel);
  o.connect(g);g.connect(target||masterGain);
  o.start();o.stop(AC.currentTime+atk+rel+.05);
}

// ── Ambient pad (chord layer) ──────────────────────
// Dreamy C-major family chords, cycling slowly
const CHORD_SEQS=[
  // C maj9
  [261.63,329.63,392.00,493.88,523.25],
  // A min7
  [220.00,261.63,329.63,392.00,440.00],
  // F maj7
  [174.61,220.00,261.63,349.23,440.00],
  // G sus4
  [196.00,261.63,293.66,349.23,392.00],
];
let chordIdx=0;

function playPad(){
  if(!AC||musicMuted)return;
  const chord=CHORD_SEQS[chordIdx%CHORD_SEQS.length];
  chordIdx++;
  chord.forEach((freq,i)=>{
    // main sine
    const o=AC.createOscillator();
    const g=AC.createGain();
    o.type='sine';
    o.frequency.value=freq*(i<2?.5:1); // lower octave for bass notes
    const vol=i===0?.22:i===1?.17:.13;
    g.gain.setValueAtTime(0,AC.currentTime);
    g.gain.linearRampToValueAtTime(vol,AC.currentTime+1.8);
    g.gain.setValueAtTime(vol,AC.currentTime+3.5);
    g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+5.5);
    o.connect(g);g.connect(reverbNode);
    o.start();o.stop(AC.currentTime+6);

    // shimmer detuned layer
    const o2=AC.createOscillator();
    const g2=AC.createGain();
    o2.type='triangle';
    o2.frequency.value=freq*1.002;
    g2.gain.setValueAtTime(0,AC.currentTime);
    g2.gain.linearRampToValueAtTime(vol*.35,AC.currentTime+2.2);
    g2.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+5.8);
    o2.connect(g2);g2.connect(reverbNode);
    o2.start();o2.stop(AC.currentTime+6.2);
  });
  chordTimer=setTimeout(playPad,5800);
}

// ── Gentle arpeggio ────────────────────────────────
const ARP_NOTES=[
  261.63,329.63,392.00,493.88,  // C maj
  523.25,493.88,392.00,329.63,  // down
  220.00,261.63,329.63,392.00,  // A min
  440.00,392.00,329.63,261.63,  // down
  174.61,220.00,261.63,349.23,  // F maj
  440.00,349.23,261.63,220.00,  // down
  196.00,246.94,293.66,349.23,  // G
  392.00,349.23,293.66,246.94,  // down
];
let arpIdx=0;

function playArp(){
  if(!AC||musicMuted)return;
  const freq=ARP_NOTES[arpIdx%ARP_NOTES.length];
  arpIdx++;
  // pluck
  const o=AC.createOscillator();
  const g=AC.createGain();
  o.type='sine';o.frequency.value=freq*2; // upper octave sparkle
  g.gain.setValueAtTime(.0,AC.currentTime);
  g.gain.linearRampToValueAtTime(.095,AC.currentTime+.015);
  g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+1.1);
  o.connect(g);g.connect(reverbNode);
  o.start();o.stop(AC.currentTime+1.2);
  arpeggioTimer=setTimeout(playArp,520+Math.random()*120);
}

// ── Soft bass drone ────────────────────────────────
function startDrone(){
  if(!AC)return;
  const notes=[65.41,55.00,43.65,49.00]; // C2, A1, F1, G1
  let di=0;
  function playDrone(){
    if(!AC||musicMuted)return;
    const o=AC.createOscillator();
    const g=AC.createGain();
    o.type='sine';o.frequency.value=notes[di%notes.length];di++;
    g.gain.setValueAtTime(0,AC.currentTime);
    g.gain.linearRampToValueAtTime(.28,AC.currentTime+2);
    g.gain.setValueAtTime(.28,AC.currentTime+9);
    g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+12);
    o.connect(g);g.connect(masterGain);
    o.start();o.stop(AC.currentTime+12.5);
    setTimeout(playDrone,10500);
  }
  playDrone();
}

function startMusic(){
  if(musicStarted)return;
  musicStarted=true;
  setTimeout(playPad,600);
  setTimeout(playArp,1200);
  setTimeout(startDrone,400);
}

function toggleMute(){
  musicMuted=!musicMuted;
  const btn=document.getElementById('mute-btn');
  if(musicMuted){
    if(masterGain)masterGain.gain.linearRampToValueAtTime(.0001,AC.currentTime+.6);
    btn.textContent='♪ music off';btn.classList.add('muted');
  } else {
    if(masterGain)masterGain.gain.linearRampToValueAtTime(.9,AC.currentTime+.8);
    btn.textContent='♪ music on';btn.classList.remove('muted');
  }
}

document.getElementById('mute-btn').addEventListener('click',e=>{
  e.stopPropagation();
  if(!AC){initAudio();startMusic();}
  toggleMute();
});

// ══════════════════════════════════════════════════
//  BACKGROUND — STARS + NEBULAE
// ══════════════════════════════════════════════════
const STARS=Array.from({length:240},()=>({
  x:rn(0,1),y:rn(0,1),r:rn(.18,2.1),
  hue:rn(200,360),ph:rn(0,PI2),spd:rn(.008,.042),
  a:rn(.14,.92),drift:rn(-.00012,.00012)
}));
const DEEP=Array.from({length:110},()=>({
  x:rn(0,1),y:rn(0,1),r:rn(.1,.65),a:rn(.07,.32),hue:rn(220,310)
}));
const NEBS=[
  {x:.12,y:.2,r:.42,h:270,s:.58,ph:0,spd:.0003},
  {x:.86,y:.16,r:.36,h:320,s:.5,ph:1,spd:.0004},
  {x:.5,y:.78,r:.46,h:215,s:.54,ph:2,spd:.0002},
  {x:.92,y:.62,r:.33,h:300,s:.44,ph:3,spd:.0005},
  {x:.3,y:.55,r:.28,h:190,s:.38,ph:.5,spd:.0006},
];

let bgAlpha=1; // used to fade BG for smooth trail effect

function drawBG(dt){
  // smooth motion-blur trail
  XB.fillStyle='rgba(3,0,13,.16)';
  XB.fillRect(0,0,W,H);

  // deep static stars
  XB.save();XB.globalAlpha=.42;
  for(const s of DEEP){
    XB.beginPath();XB.arc(s.x*W,s.y*H,s.r,0,PI2);
    XB.fillStyle=`hsla(${s.hue},50%,84%,${s.a})`;XB.fill();
  }
  XB.restore();

  // nebulae (screen blend)
  XB.save();XB.globalCompositeOperation='screen';
  for(const n of NEBS){
    n.ph+=n.spd;
    const pulse=Math.sin(n.ph)*.05;
    const g=XB.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r*Math.min(W,H));
    g.addColorStop(0,`hsla(${n.h},72%,${26+pulse*80}%,${n.s*.115})`);
    g.addColorStop(.5,`hsla(${n.h+18},62%,16%,${n.s*.048})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    XB.beginPath();XB.arc(n.x*W,n.y*H,n.r*Math.min(W,H),0,PI2);
    XB.fillStyle=g;XB.fill();
  }
  XB.restore();

  // twinkling stars
  for(const s of STARS){
    s.ph+=s.spd*dt*60;
    s.x=(s.x+s.drift*dt*60+1)%1;
    const alpha=s.a*(.38+Math.sin(s.ph)*.62);
    XB.beginPath();XB.arc(s.x*W,s.y*H,s.r,0,PI2);
    XB.fillStyle=`hsla(${s.hue},78%,90%,${alpha})`;XB.fill();
    if(s.r>1.35){
      const sx=s.x*W,sy=s.y*H;
      XB.strokeStyle=`hsla(${s.hue},78%,92%,${alpha*.2})`;XB.lineWidth=.4;
      XB.beginPath();XB.moveTo(sx-s.r*2.4,sy);XB.lineTo(sx+s.r*2.4,sy);XB.stroke();
      XB.beginPath();XB.moveTo(sx,sy-s.r*2.4);XB.lineTo(sx,sy+s.r*2.4);XB.stroke();
    }
  }
}

// ══════════════════════════════════════════════════
//  PETALS
// ══════════════════════════════════════════════════
class Petal{
  constructor(){
    this.x=rn(0,W);this.y=rn(-30,-5);
    this.vx=rn(-.3,.3);this.vy=rn(.25,.75);
    this.hue=rn(300,360);this.sz=rn(5,14);
    this.rot=rn(0,PI2);this.vr=rn(-.025,.025);
    this.life=0;this.maxLife=rn(180,420); // in frames
    this.wob=rn(0,PI2);this.wobS=rn(.018,.048);this.sx=rn(.45,1);
  }
  update(dt){
    const f=dt*60;
    this.wob+=this.wobS*f;
    this.vx+=Math.sin(this.wob)*.012*f;
    this.vy+=.006*f;this.vx*=Math.pow(.995,f);
    this.x+=this.vx*f;this.y+=this.vy*f;
    this.rot+=this.vr*f;this.life+=f;
    if(this.x<-25)this.x=W+25;if(this.x>W+25)this.x=-25;
  }
  draw(){
    const progress=this.life/this.maxLife;
    const alpha=(progress<.15?progress/.15:progress>.8?(1-progress)/.2:1)*.72;
    if(alpha<=0)return;
    XP.save();XP.globalAlpha=alpha;
    XP.translate(this.x,this.y);XP.rotate(this.rot);XP.scale(this.sx,1);
    const s=this.sz;
    XP.beginPath();
    XP.moveTo(0,-s*.8);XP.bezierCurveTo(s*.88,-s*.8,s*.88,s*.68,0,s*.68);
    XP.bezierCurveTo(-s*.88,s*.68,-s*.88,-s*.8,0,-s*.8);
    XP.fillStyle=`hsl(${this.hue},82%,76%)`;XP.fill();
    XP.restore();
  }
  dead(){return this.life>=this.maxLife||this.y>H+35;}
}

// ══════════════════════════════════════════════════
//  FIREWORKS
// ══════════════════════════════════════════════════
const PALETTES=[
  [50,48,44,55],[0,355,5,350],[195,200,210,188],
  [280,270,290,265],[120,130,110,140],[30,20,40,25],
  [320,310,330,315],[175,165,185,160],[60,55,65,50],[240,230,250,235],
];

class FWSpark{
  constructor(x,y,z,vx,vy,vz,hue,sat,type,size){
    this.x=x;this.y=y;this.z=z;
    this.vx=vx;this.vy=vy;this.vz=vz;
    this.hue=hue;this.sat=sat;this.type=type;
    this.baseSize=size||rn(1.4,3.2);
    this.life=1;
    this.decayRate=type==='willow'?rn(.006,.011):type==='palm'?rn(.007,.012):type==='ring'?rn(.008,.013):rn(.009,.017);
    this.dragF=type==='willow'?.017:.025;
    this.gravF=type==='willow'?.038:type==='palm'?.028:.044;
    this.trail=[];
    this.tLen=type==='willow'?30:type==='palm'?24:13;
    this.twinkle=Math.random()>.5;
    this.tp=rn(0,PI2);this.ts=rn(.07,.16);
    this.split=type==='crossette'&&Math.random()>.65;
    this.splitDone=false;this.splitAt=rn(.38,.58);
    this.hue2=this.hue+rn(28,85);
  }
  update(dt,arr){
    const f=dt*60;
    this.trail.unshift({x:this.x,y:this.y,z:this.z});
    if(this.trail.length>this.tLen)this.trail.pop();
    this.tp+=this.ts*f;
    const drag=Math.pow(1-this.dragF,f);
    this.vx*=drag;this.vy*=drag;this.vz*=drag;
    this.vy+=this.gravF*f;
    if(this.type==='willow')this.vy+=.010*f;
    this.x+=this.vx*f;this.y+=this.vy*f;this.z+=this.vz*f;
    this.life-=this.decayRate*f;
    if(this.split&&!this.splitDone&&this.life<this.splitAt){
      this.splitDone=true;
      for(let i=0;i<4;i++){
        const a=(i/4)*PI2;
        arr.push(new FWSpark(this.x,this.y,this.z,this.vx+Math.cos(a)*rn(1.8,3.8),this.vy+Math.sin(a)*rn(.8,2.2),this.vz+rn(-.8,.8),this.hue+rn(-18,18),this.sat,'glitter',1.1));
      }
    }
  }
  draw(){
    if(this.life<=0)return;
    const P=600;const sc=P/(P+this.z);
    const sz=this.baseSize*sc*(this.type==='palm'?1.35:1);
    const twA=this.twinkle?(.5+Math.sin(this.tp)*.5):1;
    const alpha=Math.max(0,this.life*twA);
    if(alpha<.012)return;
    const lit=52+sc*32;
    // trail
    if(this.trail.length>1){
      for(let i=1;i<this.trail.length;i++){
        const p=1-i/this.trail.length;
        const tsc=P/(P+this.trail[i].z);
        XP.beginPath();
        XP.moveTo(this.trail[i-1].x,this.trail[i-1].y);
        XP.lineTo(this.trail[i].x,this.trail[i].y);
        const tA=alpha*p*(this.type==='willow'?.5:this.type==='palm'?.46:.34);
        XP.strokeStyle=`hsla(${this.hue},${this.sat}%,${lit+p*16}%,${tA})`;
        XP.lineWidth=Math.max(.15,sz*p*.65*tsc);XP.lineCap='round';XP.stroke();
      }
    }
    // head
    XP.save();XP.globalAlpha=alpha;
    if(this.type==='glitter'||this.type==='ring'){
      const g=XP.createRadialGradient(this.x,this.y,0,this.x,this.y,sz*4.5);
      g.addColorStop(0,`hsl(${this.hue2},100%,97%)`);
      g.addColorStop(.3,`hsl(${this.hue},${this.sat}%,${lit}%)`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      XP.beginPath();XP.arc(this.x,this.y,sz*4.5,0,PI2);XP.fillStyle=g;XP.fill();
      XP.beginPath();XP.arc(this.x,this.y,sz*.7,0,PI2);XP.fillStyle='white';XP.fill();
    } else {
      const g=XP.createRadialGradient(this.x,this.y,0,this.x,this.y,sz*5.5*sc);
      g.addColorStop(0,`hsla(${this.hue},100%,97%,${alpha})`);
      g.addColorStop(.28,`hsla(${this.hue},${this.sat}%,${lit}%,${alpha*.65})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      XP.beginPath();XP.arc(this.x,this.y,sz*5.5*sc,0,PI2);XP.fillStyle=g;XP.fill();
      XP.beginPath();XP.arc(this.x,this.y,sz*sc,0,PI2);XP.fillStyle=`hsl(${this.hue},100%,93%)`;XP.fill();
    }
    XP.restore();
  }
  dead(){return this.life<=0||this.y>H+85;}
}

class FWRocket{
  constructor(){
    this.x=rn(W*.08,W*.92);this.y=H+8;
    this.z=rn(-160,160);
    const P=600;this.scale=P/(P+this.z);
    this.tx=this.x+rn(-55,55);
    this.ty=rn(H*.07,H*.40);
    const frames=rn(40,65);
    this.vx=(this.tx-this.x)/frames;
    this.vy=(this.ty-H)/frames;
    this.trail=[];
    this.hue=PALETTES[Math.floor(rn(0,PALETTES.length))][Math.floor(rn(0,4))];
    this.done=false;
    const types=['peony','willow','chrysanthemum','crossette','ring','palm','glitter'];
    const w=[.28,.18,.16,.12,.10,.10,.06];
    let r2=Math.random(),acc=0;this.burstType='peony';
    for(let i=0;i<types.length;i++){acc+=w[i];if(r2<acc){this.burstType=types[i];break;}}
    this.burstR=rn(4.8,10.5)*this.scale;
    this.burstN=Math.floor(rn(55,130)*this.scale);
    this._whistle();
  }
  _whistle(){
    if(!AC)return;
    try{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(200+rn(0,80),AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200+rn(0,200),AC.currentTime+.5);
      g.gain.setValueAtTime(.0,AC.currentTime);
      g.gain.linearRampToValueAtTime(.12*this.scale,AC.currentTime+.04);
      g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+.55);
      o.connect(g);g.connect(masterGain);o.start();o.stop(AC.currentTime+.58);
    }catch(e){}
  }
  update(dt){
    const f=dt*60;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>18)this.trail.shift();
    this.vy+=.05*f;
    this.x+=this.vx*f;this.y+=this.vy*f;
    return this.y<=this.ty&&!this.done;
  }
  draw(){
    for(let i=1;i<this.trail.length;i++){
      const p=i/this.trail.length;
      XP.beginPath();XP.moveTo(this.trail[i-1].x,this.trail[i-1].y);XP.lineTo(this.trail[i].x,this.trail[i].y);
      XP.strokeStyle=`hsla(${this.hue},88%,${48+p*34}%,${p*.78})`;
      XP.lineWidth=p*2.6*this.scale;XP.lineCap='round';XP.stroke();
    }
    XP.beginPath();XP.arc(this.x,this.y,2.8*this.scale,0,PI2);
    XP.fillStyle=`hsl(${this.hue},100%,90%)`;
    XP.shadowColor='white';XP.shadowBlur=9;XP.fill();XP.shadowBlur=0;
  }
  burst(arr){
    const h=this.hue,pal=PALETTES[Math.floor(rn(0,PALETTES.length))];
    FW_FLASHES.push({x:this.x,y:this.y,r:this.burstR*17,life:1,hue:h,z:this.z});
    // boom sound
    if(AC){
      try{
        const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*.3),AC.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.5);
        const src=AC.createBufferSource();src.buffer=buf;
        const flt=AC.createBiquadFilter();flt.type='lowpass';flt.frequency.value=160+rn(0,60);
        const g=AC.createGain();
        g.gain.setValueAtTime(.6*this.scale,AC.currentTime);
        g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+.32);
        src.connect(flt);flt.connect(g);g.connect(masterGain);src.start();src.stop(AC.currentTime+.34);
        // sparkle shimmer
        setTimeout(()=>{
          if(!AC)return;
          const o=AC.createOscillator(),gv=AC.createGain();
          o.type='triangle';o.frequency.value=rn(1200,2200);
          gv.gain.setValueAtTime(.045,AC.currentTime);
          gv.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+.4);
          o.connect(gv);gv.connect(reverbNode);o.start();o.stop(AC.currentTime+.42);
        },30);
      }catch(e){}
    }
    const n=this.burstN;const sat=rn(84,100);
    if(this.burstType==='ring'){
      for(let i=0;i<n;i++){
        const a=(i/n)*PI2;const sp=this.burstR*rn(.88,1.12);
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp*.68,Math.sin(a+1)*sp*.38,pal[i%pal.length],sat,'ring',rn(1.1,2.1)));
      }
      for(let i=0;i<Math.floor(n*.38);i++){
        const a=(i/Math.floor(n*.38))*PI2;const sp=this.burstR*rn(.3,.48);
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp*.68,Math.sin(a)*sp*.3,h+28,sat,'glitter',.95));
      }
    } else if(this.burstType==='willow'){
      for(let i=0;i<n;i++){
        const a=(i/n)*PI2+rn(-.04,.04);const sp=this.burstR*rn(.68,1.18);
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp,rn(-sp*.28,sp*.28),pal[i%pal.length],sat,'willow',rn(1.1,2.4)));
      }
    } else if(this.burstType==='palm'){
      const arms=Math.floor(rn(5,9));
      for(let arm=0;arm<arms;arm++){
        const bA=(arm/arms)*PI2+rn(-.1,.1);const aN=Math.floor(n/arms);
        for(let j=0;j<aN;j++){
          const t=j/aN;const sp=this.burstR*(.28+t*.84);const spread=.17*t;
          const a=bA+rn(-spread,spread);
          arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp,rn(-sp*.24,sp*.24),h+arm*11,sat,'palm',rn(1.4,2.9)));
        }
      }
    } else if(this.burstType==='chrysanthemum'){
      for(let i=0;i<n;i++){
        const a=(i/n)*PI2;const sp=this.burstR*rn(.84,1.14);const layer=i%2;
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp*(layer?.64:1),Math.sin(a)*sp*(layer?.64:1),rn(-sp*.19,sp*.19),layer?h+38:h,sat,'peony',layer?.95:rn(1.1,1.95)));
      }
    } else if(this.burstType==='crossette'){
      for(let i=0;i<n;i++){
        const a=(i/n)*PI2+rn(-.05,.05);const sp=this.burstR*rn(.78,1.18);
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp,rn(-sp*.28,sp*.28),pal[i%pal.length],sat,'crossette',rn(1.4,2.6)));
      }
    } else if(this.burstType==='glitter'){
      for(let i=0;i<n;i++){
        const a=(i/n)*PI2+rn(-.08,.08);const sp=this.burstR*rn(.48,1.28);
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp,rn(-sp*.48,sp*.48),50+rn(-11,11),100,'glitter',rn(.75,1.75)));
      }
    } else { // peony
      for(let i=0;i<n;i++){
        const a=(i/n)*PI2+rn(-.06,.06);const sp=this.burstR*rn(.74,1.24);
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp,rn(-sp*.58,sp*.58),pal[i%pal.length],sat,'peony',rn(1.1,2.7)));
      }
      for(let i=0;i<Math.floor(n*.22);i++){
        const a=rn(0,PI2);const sp=this.burstR*rn(.14,.38);
        arr.push(new FWSpark(this.x,this.y,this.z,Math.cos(a)*sp,Math.sin(a)*sp,rn(-sp*.38,sp*.38),50,100,'glitter',.9));
      }
    }
  }
}

const FW_FLASHES=[];
let petals=[];
let fwSparks=[];
let fwRockets=[];
let fwActive=false;

function launchRocket(){
  if(!fwActive)return;
  fwRockets.push(new FWRocket());
  setTimeout(launchRocket,rn(1300,3400));
}
function startFireworks(){
  fwActive=true;
  // fanfare burst - first wave
  for(let i=0;i<5;i++)setTimeout(()=>fwRockets.push(new FWRocket()),i*220);
  setTimeout(launchRocket,2000);
  // birthday fanfare sound
  if(AC){
    const fanfare=[523.25,659.25,783.99,1046.5,1318.5,1567.98];
    fanfare.forEach((f,i)=>{
      setTimeout(()=>{
        makeOsc(f,'sine',.38,.02,.55,reverbNode);
        makeOsc(f*1.5,'triangle',.14,.02,.4,reverbNode);
      },i*80);
    });
  }
}

// ══════════════════════════════════════════════════
//  COUNTDOWN
// ══════════════════════════════════════════════════
const elH=document.getElementById('dh');
const elM=document.getElementById('dm');
const elS=document.getElementById('ds');
let prevH='',prevM='',prevS='';
let midnightFired=false;

const pad=n=>String(n).padStart(2,'0');

function flipEl(el,val,prev){
  if(val===prev)return;
  el.classList.remove('flip');void el.offsetWidth;
  el.textContent=val;el.classList.add('flip');
}

function tick(){
  const now=new Date();
  const midnight=new Date(now);midnight.setHours(24,0,0,0);
  const diff=midnight-now;
  if(diff<=0){
    if(!midnightFired){midnightFired=true;triggerMidnight();}
    return;
  }
  const totalSec=Math.floor(diff/1000);
  const h=Math.floor(totalSec/3600);
  const m=Math.floor((totalSec%3600)/60);
  const s=totalSec%60;
  const sh=pad(h),sm=pad(m),ss=pad(s);
  flipEl(elH,sh,prevH);flipEl(elM,sm,prevM);flipEl(elS,ss,prevS);
  prevH=sh;prevM=sm;prevS=ss;
}

function triggerMidnight(){
  document.getElementById('midnight').classList.add('on');
  startFireworks();
}

tick();setInterval(tick,1000);

// ══════════════════════════════════════════════════
//  TAP TO START
// ══════════════════════════════════════════════════
function handleStart(){
  initAudio();startMusic();
  const st=document.getElementById('starter');
  st.classList.add('gone');
  setTimeout(()=>st.remove(),1200);
}
document.getElementById('starter').addEventListener('click',handleStart);
document.getElementById('starter').addEventListener('touchend',e=>{e.preventDefault();handleStart();});

// seed petals
for(let i=0;i<55;i++)petals.push(new Petal());

// ══════════════════════════════════════════════════
//  MAIN LOOP — delta-time based
// ══════════════════════════════════════════════════
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastTime)/1000,.05); // cap at 50ms
  lastTime=now;

  drawBG(dt);
  XP.clearRect(0,0,W,H);

  // petals during countdown
  if(!fwActive){
    if(Math.random()<dt*8&&petals.length<110)petals.push(new Petal());
    for(let i=petals.length-1;i>=0;i--){
      petals[i].update(dt);petals[i].draw();
      if(petals[i].dead())petals.splice(i,1);
    }
  }

  // burst flashes
  const P=600;
  for(let i=FW_FLASHES.length-1;i>=0;i--){
    const f=FW_FLASHES[i];
    f.life-=.055*dt*60;
    if(f.life<=0){FW_FLASHES.splice(i,1);continue;}
    const sc=P/(P+f.z);
    const g=XP.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*sc*f.life);
    g.addColorStop(0,`hsla(${f.hue},100%,98%,${f.life*.82})`);
    g.addColorStop(.22,`hsla(${f.hue},88%,74%,${f.life*.48})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    XP.save();XP.globalCompositeOperation='lighter';
    XP.beginPath();XP.arc(f.x,f.y,f.r*sc*f.life,0,PI2);XP.fillStyle=g;XP.fill();
    XP.restore();
  }

  // rockets
  for(let i=fwRockets.length-1;i>=0;i--){
    const r=fwRockets[i];r.draw();
    if(r.update(dt)){r.done=true;r.burst(fwSparks);fwRockets.splice(i,1);}
  }

  // sparks
  XP.save();XP.globalCompositeOperation='lighter';
  for(let i=fwSparks.length-1;i>=0;i--){
    fwSparks[i].update(dt,fwSparks);fwSparks[i].draw();
    if(fwSparks[i].dead())fwSparks.splice(i,1);
  }
  XP.restore();
  if(fwSparks.length>2400)fwSparks.splice(0,fwSparks.length-2400);
}
requestAnimationFrame(loop);
</script>
